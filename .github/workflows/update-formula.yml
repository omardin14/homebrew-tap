name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get version from dispatch
        id: version
        run: |
          # Strip leading 'v' from tag (e.g. v1.0.0 -> 1.0.0)
          VERSION="${{ github.event.client_payload.version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download sdist and compute SHA256
        id: sha
        run: |
          pip download --no-deps --no-binary :all: "scrum-agent==${{ steps.version.outputs.version }}" -d /tmp/sdist
          SHA=$(sha256sum /tmp/sdist/scrum_agent-${{ steps.version.outputs.version }}.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          sed -i "s|url \".*\"|url \"https://files.pythonhosted.org/packages/source/s/scrum-agent/scrum_agent-${VERSION}.tar.gz\"|" Formula/scrum-agent.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/scrum-agent.rb

      - name: Generate resource stanzas
        run: |
          pip install homebrew-pypi-poet
          poet scrum-agent > /tmp/resources.rb || true
          # If poet succeeded, inject resources into formula
          if [ -s /tmp/resources.rb ]; then
            echo "Resource stanzas generated"
          else
            echo "Warning: poet did not generate resources — manual update may be needed"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/scrum-agent.rb
          git diff --staged --quiet && exit 0
          git commit -m "update scrum-agent to ${{ steps.version.outputs.version }}"
          git push

